name: Maestro CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  APP_DIR: app/packages/demo

jobs:
  android-maestro:
    name: Android Maestro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install JS dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install --frozen-lockfile

      - name: Run project setup
        working-directory: ${{ env.APP_DIR }}
        run: yarn setup --clean

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Android emulator and tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6000M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -euxo pipefail

            cd $APP_DIR

            nohup npx expo start --dev-client > /tmp/expo-android.log 2>&1 &
            sleep 30

            adb devices
            adb reverse tcp:8081 tcp:8081 || true

            npx expo run:android --variant debug --no-bundler

            mkdir -p maestro-artifacts
            adb exec-out screencap -p > maestro-artifacts/final-android-screen.png || true

            maestro --version
            maestro -p android test demo/maestro/basic.android.yml \
              --format junit \
              --output maestro-artifacts/android-maestro-junit.xml

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-maestro-artifacts
          path: |
            /tmp/expo-android.log
            ${{ env.APP_DIR }}/maestro-artifacts
          if-no-files-found: warn

  ios-maestro:
    name: iOS Maestro
    runs-on: macos-latest

    env:
      SIMULATOR_NAME: iPhone 16

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode and simulators
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Install JS dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install --frozen-lockfile

      - name: Run project setup
        working-directory: ${{ env.APP_DIR }}
        run: yarn setup --clean

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install CocoaPods
        working-directory: ${{ env.APP_DIR }}/ios
        run: pod install

      - name: Boot iOS simulator
        run: |
          set -euxo pipefail

          UDID=$(xcrun simctl list devices available | grep "${SIMULATOR_NAME}" | head -n 1 | sed -E 's/.*\(([-A-F0-9]+)\).*/\1/')
          if [ -z "$UDID" ]; then
            echo "Could not find simulator ${SIMULATOR_NAME}"
            exit 1
          fi

          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          open -a Simulator
          xcrun simctl bootstatus "$UDID" -b

      - name: Build and install iOS debug app
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euxo pipefail

          nohup npx expo start --dev-client > /tmp/expo-ios.log 2>&1 &
          sleep 30

          npx expo run:ios --device "${SIMULATOR_NAME}" --no-bundler

      - name: Run Maestro iOS test
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euxo pipefail

          mkdir -p maestro-artifacts
          xcrun simctl io "$SIMULATOR_UDID" screenshot maestro-artifacts/final-ios-screen.png || true

          maestro --version
          maestro -p ios test demo/maestro/basic.ios.yml \
            --format junit \
            --output maestro-artifacts/ios-maestro-junit.xml

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-artifacts
          path: |
            /tmp/expo-ios.log
            ${{ env.APP_DIR }}/maestro-artifacts
          if-no-files-found: warn