name: Maestro CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/packages/demo/**'
      - 'pkg/calculator/**'
      - '.github/workflows/maestro-ci.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'app/packages/demo/**'
      - 'pkg/calculator/**'
      - '.github/workflows/maestro-ci.yml'

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  APP_DIR: app/packages/demo

jobs:
  android-maestro:
    name: Android Maestro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: app/yarn.lock

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install JS dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install --frozen-lockfile

      - name: Build Android app on EAS
        working-directory: ${{ env.APP_DIR }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euxo pipefail
          eas build --platform android --profile maestro-release-android --non-interactive --wait --json > /tmp/eas-android-build.json
          ANDROID_BUILD_URL=$(node -e 'const fs=require("fs");const data=JSON.parse(fs.readFileSync("/tmp/eas-android-build.json","utf8"));const out=Array.isArray(data)?data[0]:data;process.stdout.write(out?.artifacts?.buildUrl||"");')
          if [ -z "$ANDROID_BUILD_URL" ]; then
            echo "Could not parse Android build URL from EAS response"
            cat /tmp/eas-android-build.json
            exit 1
          fi
          curl -fL "$ANDROID_BUILD_URL" -o /tmp/maestro-android.apk

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build calculator service
        run: cargo build --release -p calculator

      - name: Start calculator service
        run: |
          nohup ./target/release/calculator > /tmp/calculator.log 2>&1 &

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9999/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Calculator service failed health check"
          cat /tmp/calculator.log || true
          exit 1

      - name: Run Android emulator and tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6000M
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-snapshot
            -noaudio
            -no-boot-anim
            -no-metrics
          disable-animations: true
          script: |
            adb start-server
            adb wait-for-device
            adb shell getprop sys.boot_completed
            sleep 30
            adb devices
            adb install -r /tmp/maestro-android.apk
            mkdir -p app/packages/demo/maestro-artifacts
            maestro --version
            maestro -p android test app/packages/demo/maestro/basic.android.yml  --format junit  --output app/packages/demo/maestro-artifacts/android-maestro-junit.xml  --test-output-dir app/packages/demo/maestro-artifacts/test-output

      - name: Collect Android logs
        if: always()
        run: |
          mkdir -p ${{ env.APP_DIR }}/maestro-artifacts
          cp /tmp/eas-android-build.json ${{ env.APP_DIR }}/maestro-artifacts/eas-android-build.json || true

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-maestro-artifacts
          path: |
            ${{ env.APP_DIR }}/maestro-artifacts
            ${{ env.APP_DIR }}/maestro-artifacts/test-output
          if-no-files-found: warn

  ios-maestro:
    name: iOS Maestro
    runs-on: macos-latest

    env:
      SIMULATOR_NAME: iPhone 16 Pro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: app/yarn.lock

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode and simulators
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Install JS dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install --frozen-lockfile

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build calculator service
        run: cargo build --release -p calculator

      - name: Start calculator service
        run: |
          nohup ./target/release/calculator > /tmp/calculator.log 2>&1 &


          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9999/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Calculator service failed health check"
          cat /tmp/calculator.log || true
          exit 1

      - name: Boot iOS simulator
        run: |
          set -euxo pipefail

          UDID=$(xcrun simctl list devices available | grep "${SIMULATOR_NAME}" | head -n 1 | sed -E 's/.*\(([-A-F0-9]+)\).*/\1/')
          if [ -z "$UDID" ]; then
            echo "Could not find simulator ${SIMULATOR_NAME}"
            exit 1
          fi

          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          open -a Simulator
          xcrun simctl bootstatus "$UDID" -b

      - name: Build iOS simulator app on EAS
        working-directory: ${{ env.APP_DIR }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euxo pipefail

          eas build --platform ios --profile maestro-release-ios-sim --non-interactive --wait --json > /tmp/eas-ios-build.json
          IOS_BUILD_URL=$(node -e 'const fs=require("fs");const data=JSON.parse(fs.readFileSync("/tmp/eas-ios-build.json","utf8"));const out=Array.isArray(data)?data[0]:data;process.stdout.write(out?.artifacts?.buildUrl||"");')
          if [ -z "$IOS_BUILD_URL" ]; then
            echo "Could not parse iOS build URL from EAS response"
            cat /tmp/eas-ios-build.json
            exit 1
          fi
          curl -fL "$IOS_BUILD_URL" -o /tmp/maestro-ios-sim.tar.gz
          mkdir -p /tmp/maestro-ios
          tar -xzf /tmp/maestro-ios-sim.tar.gz -C /tmp/maestro-ios
          APP_PATH=$(find /tmp/maestro-ios -type d -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find .app bundle in downloaded iOS simulator archive"
            exit 1
          fi
          echo "IOS_APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Install and launch iOS app on simulator
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euxo pipefail

          xcrun simctl install "$SIMULATOR_UDID" "$IOS_APP_PATH"
          xcrun simctl launch "$SIMULATOR_UDID" com.timmyjose.maestrocidemo

      - name: Collect iOS logs
        if: always()
        run: |
          mkdir -p ${{ env.APP_DIR }}/maestro-artifacts
          cp /tmp/eas-ios-build.json ${{ env.APP_DIR }}/maestro-artifacts/eas-ios-build.json || true

      - name: Run Maestro iOS test
        run: |
          set -euxo pipefail

          mkdir -p app/packages/demo/maestro-artifacts
          maestro --version
          maestro -p ios test app/packages/demo/maestro/basic.ios.yml --format junit --output app/packages/demo/maestro-artifacts/ios-maestro-junit.xml --test-output-dir app/packages/demo/maestro-artifacts/test-output

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-artifacts
          path: |
            ${{ env.APP_DIR }}/maestro-artifacts
            ${{ env.APP_DIR }}/maestro-artifacts/test-output
          if-no-files-found: warn
