name: Maestro CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  APP_DIR: app/packages/demo

jobs:
  android-maestro:
    name: Android Maestro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: app/yarn.lock

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install JS dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install --frozen-lockfile

      - name: Run project setup
        working-directory: ${{ env.APP_DIR }}
        run: yarn setup --clean

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Build calculator service
        run: cargo build --release -p calculator

      - name: Start calculator service
        run: |
          nohup ./target/release/calculator > /tmp/calculator.log 2>&1 &

          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9999/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Calculator service failed health check"
          cat /tmp/calculator.log || true
          exit 1

      - name: Run Android emulator and tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6000M
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-snapshot
            -noaudio
            -no-boot-anim
            -no-metrics
          disable-animations: true
          script: |
            adb start-server
            adb wait-for-device
            adb shell getprop sys.boot_completed
            sleep 30
            adb devices
            cd app/packages/demo && EXPO_PUBLIC_BASE_BACKEND_URL=http://10.0.2.2:9999 nohup npx expo start --dev-client --host localhost > /tmp/expo-android.log 2>&1 &
            sleep 30
            adb reverse tcp:8081 tcp:8081
            cd app/packages/demo && npx expo run:android --variant debug --no-bundler
            mkdir -p app/packages/demo/maestro-artifacts
            maestro --version
            maestro -p android test app/packages/demo/maestro/basic.android.yml  --format junit  --output app/packages/demo/maestro-artifacts/android-maestro-junit.xml  --test-output-dir app/packages/demo/maestro-artifacts/test-output

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-maestro-artifacts
          path: |
            ${{ env.APP_DIR }}/maestro-artifacts
            ${{ env.APP_DIR }}/maestro-artifacts/test-output
          if-no-files-found: warn

  ios-maestro:
    name: iOS Maestro
    runs-on: macos-latest

    env:
      SIMULATOR_NAME: iPhone 16 Pro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: app/yarn.lock

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode and simulators
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Install JS dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install --frozen-lockfile

      - name: Run project setup
        working-directory: ${{ env.APP_DIR }}
        run: yarn setup --clean

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Build calculator service
        run: cargo build --release -p calculator

      - name: Start calculator service
        run: |
          nohup ./target/release/calculator > /tmp/calculator.log 2>&1 &


          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9999/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Calculator service failed health check"
          cat /tmp/calculator.log || true
          exit 1

      - name: Install CocoaPods
        working-directory: ${{ env.APP_DIR }}/ios
        run: pod install

      - name: Boot iOS simulator
        run: |
          set -euxo pipefail

          UDID=$(xcrun simctl list devices available | grep "${SIMULATOR_NAME}" | head -n 1 | sed -E 's/.*\(([-A-F0-9]+)\).*/\1/')
          if [ -z "$UDID" ]; then
            echo "Could not find simulator ${SIMULATOR_NAME}"
            exit 1
          fi

          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          open -a Simulator
          xcrun simctl bootstatus "$UDID" -b

      - name: Build iOS simulator app
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euxo pipefail

          export EXPO_NO_INTERACTIVE=1
          EXPO_PUBLIC_BASE_BACKEND_URL=http://127.0.0.1:9999 nohup npx expo start --host localhost > /tmp/expo-ios.log 2>&1 &
          sleep 30

          npx expo run:ios --device "${SIMULATOR_NAME}" --no-bundler

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "maestrocidemo.app" | grep "Debug-iphonesimulator" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built maestrocidemo.app in DerivedData"
            exit 1
          fi
          echo "IOS_APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Install and launch iOS app on simulator
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euxo pipefail

          xcrun simctl install "$SIMULATOR_UDID" "$IOS_APP_PATH"
          xcrun simctl launch "$SIMULATOR_UDID" com.timmyjose.maestrocidemo

      - name: Run Maestro iOS test
        run: |
          set -euxo pipefail

          mkdir -p app/packages/demo/maestro-artifacts
          maestro --version
          maestro -p ios test app/packages/demo/maestro/basic.ios.yml --format junit --output app/packages/demo/maestro-artifacts/ios-maestro-junit.xml --test-output-dir app/packages/demo/maestro-artifacts/test-output

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-artifacts
          path: |
            ${{ env.APP_DIR }}/maestro-artifacts
            ${{ env.APP_DIR }}/maestro-artifacts/test-output
          if-no-files-found: warn